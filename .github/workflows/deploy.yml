name: Deploy to Hostinger FTP (Next.js Static Export)

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [sanity-publish]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js Static Export
        env:
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
        run: npm run build

      - name: Deploy to Hostinger via LFTP
        run: |
          sudo apt-get update && sudo apt-get install -y lftp
          lftp -c "
            set ftp:ssl-allow no
            open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }}
            mirror -R -v --delete --parallel=3 --exclude-glob .git* --exclude-glob .htaccess ./out/ ./
            quit
          "
